<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - ForBids</title>
    <link rel="stylesheet" href="css/iniciarSesión.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="main-content d-flex flex-column">
        <nav class="navbar navbar-light bg-transparent py-3">
            <div class="container d-flex justify-content-between">
                <a href="index.html" class="text-decoration-none text-muted fw-600 small">
                    <i class="bi bi-arrow-left me-1"></i> Volver
                </a>
                <a class="navbar-brand fw-bold text-primary d-flex align-items-center" href="index.html">
                    <i class="bi bi-bag-check-fill me-2 fs-3"></i> ForBids
                </a>
                <div style="width: 60px;"></div> </div>
        </nav>

        <div class="container my-auto py-5">
            <div class="row justify-content-center">
                <div class="col-md-5 col-lg-4">
                    <div class="login-card shadow-sm p-4 p-md-5 bg-white border-0 rounded-4">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold h3">Iniciar sesión</h2>
                            <p class="text-muted small">Bienvenido de nuevo a ForBids</p>
                        </div>

                        <form>
                            <div class="mb-3">
                                <label class="form-label small fw-600">Correo electrónico</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-muted">
                                        <i class="bi bi-envelope"></i>
                                    </span>
                                    <input type="email" class="form-control border-start-0 ps-0" placeholder="tu@email.com">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-600">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-muted">
                                        <i class="bi bi-lock"></i>
                                    </span>
                                    <input type="password" class="form-control border-start-0 ps-0" placeholder="••••••••">
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mb-4 small">
                                <a href="#" class="text-decoration-none text-primary fw-600">¿Has olvidado tu contraseña?</a>
                            </div>

                            <button type="submit" class="btn btn-primary-custom w-100 py-2 mb-3">Iniciar sesión</button>
                        </form>

                        <div class="text-center mt-3">
                            <p class="small text-muted">
                                ¿No tienes cuenta? <a href="registro.html" class="text-primary fw-bold text-decoration-none">Regístrate aquí</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div> 

    <footer class="main-footer">
        <div class="container">
            <div class="d-flex flex-wrap justify-content-center align-items-center gap-4 mb-4">
                
                <a class="navbar-brand fw-bold text-primary d-flex align-items-center me-2" href="index.html">
                    <i class="bi bi-bag-check-fill me-2 fs-4"></i> ForBids
                </a>

                <a href="#" class="text-white text-decoration-none">Sobre Nosotros</a>
                <a href="#" class="text-white text-decoration-none">Contacto</a>
                <a href="#" class="text-white text-decoration-none">Cookies</a>
                <a href="#" class="text-white text-decoration-none">Política de privacidad</a>
                <a href="#" class="text-white text-decoration-none">Términos y Condiciones</a>

            </div>

            <hr class="border-secondary my-4">

            <div class="text-center small">
                © 2026 ForBids. Todos los derechos reservados.
            </div>
        </div>
    </footer>
</body>
</html>
